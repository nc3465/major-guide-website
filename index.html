<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>志愿填报专业助手</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #f5f9fc;
      color: #1f2d3d;
    }

    .container {
      max-width: 1080px;
      margin: 0 auto;
      padding: 40px 20px 60px;
    }

    h1 {
      text-align: center;
      margin-bottom: 12px;
      color: #133b5c;
    }

    .subtitle {
      text-align: center;
      color: #5b6b7a;
      margin-bottom: 28px;
      line-height: 1.8;
    }

    .search-box,
    .compare-box {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      justify-content: center;
    }

    input {
      width: 320px;
      max-width: 100%;
      padding: 14px 16px;
      border: 1px solid #c9d8e6;
      border-radius: 12px;
      font-size: 16px;
      outline: none;
      background: #fff;
    }

    input:focus {
      border-color: #4f9ecf;
      box-shadow: 0 0 0 3px rgba(79, 158, 207, 0.12);
    }

    button {
      padding: 14px 22px;
      border: none;
      border-radius: 12px;
      background: #4f9ecf;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s ease;
    }

    button:hover {
      background: #3f8fbe;
    }

    .secondary-btn {
      background: #eef7fc;
      color: #246b9a;
      border: 1px solid #cfe2ef;
    }

    .secondary-btn:hover {
      background: #e4f1f9;
    }

    .tips {
      text-align: center;
      color: #7a8a99;
      margin-bottom: 20px;
      font-size: 14px;
      line-height: 1.7;
    }

    .panel {
      background: white;
      border-radius: 18px;
      padding: 22px;
      box-shadow: 0 8px 24px rgba(18, 60, 90, 0.08);
      margin-bottom: 24px;
    }

    .panel-title {
      font-size: 18px;
      font-weight: bold;
      color: #133b5c;
      margin-bottom: 8px;
    }

    .panel-desc {
      color: #6f7e8c;
      font-size: 14px;
      margin-bottom: 14px;
      line-height: 1.7;
    }

    .recommend-box {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-start;
      margin-bottom: 14px;
    }

    .pref-btn {
      background: white;
      color: #246b9a;
      border: 1px solid #b9d5e8;
      padding: 10px 16px;
      border-radius: 999px;
      font-size: 14px;
    }

    .pref-btn:hover {
      background: #eef7fc;
    }

    .pref-btn.active {
      background: #4f9ecf;
      color: white;
      border-color: #4f9ecf;
    }

    .action-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .card {
      background: white;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(18, 60, 90, 0.08);
      line-height: 1.85;
      margin-bottom: 20px;
    }

    .card h2 {
      margin-top: 0;
      color: #133b5c;
      margin-bottom: 12px;
    }

    .tag {
      display: inline-block;
      background: #eaf4fb;
      color: #246b9a;
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 13px;
      margin-right: 8px;
      margin-bottom: 8px;
    }

    .section-title {
      margin-top: 20px;
      margin-bottom: 8px;
      font-weight: bold;
      color: #2d4b66;
    }

    .empty {
      background: white;
      border-radius: 18px;
      padding: 28px;
      box-shadow: 0 8px 24px rgba(18, 60, 90, 0.08);
      text-align: center;
      color: #6d7b88;
      line-height: 1.8;
    }

    .footer-note {
      margin-top: 18px;
      font-size: 13px;
      color: #7a8a99;
      line-height: 1.7;
    }

    .compare-grid {
      display: grid;
      grid-template-columns: 180px 1fr 1fr;
      gap: 12px;
      margin-top: 12px;
      align-items: start;
    }

    .compare-cell {
      background: #f8fbfd;
      border: 1px solid #e3eef5;
      border-radius: 14px;
      padding: 14px;
      min-height: 100%;
    }

    .compare-label {
      font-weight: bold;
      color: #2d4b66;
      background: #eef7fc;
    }

    .decision-box {
      background: #f3f9fd;
      border: 1px solid #d7eaf5;
      border-radius: 14px;
      padding: 16px;
      margin-top: 12px;
      color: #244b66;
    }

    @media (max-width: 800px) {
      .compare-grid {
        grid-template-columns: 1fr;
      }

      .compare-label {
        margin-top: 8px;
      }
    }

    /* Suggestion box styles */
    .search-box {
      display: flex;
      gap: 12px;
      margin-bottom: 18px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .search-input-wrapper {
      position: relative;
    }

    #suggestion-box {
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      background: white;
      border: 1px solid #c9d8e6;
      border-top: none;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 8px 20px rgba(18, 60, 90, 0.1);
      z-index: 1000;
      display: none;
      max-height: 300px;
      overflow-y: auto;
      margin-top: 0;
    }

    #suggestion-box.show {
      display: block;
      animation: slideDown 0.2s ease;
    }

    .suggestion-item {
      padding: 12px 16px;
      cursor: pointer;
      font-size: 16px;
      color: #1f2d3d;
      border-bottom: 1px solid #eef2f7;
      transition: background-color 0.15s ease;
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    .suggestion-item:hover {
      background-color: #eef7fc;
      color: #4f9ecf;
    }

    .suggestion-item.highlighted {
      background-color: #e4f1f9;
      color: #4f9ecf;
      border-left: 3px solid #4f9ecf;
      padding-left: 13px;
    }

    .suggestion-item strong {
      color: #4f9ecf;
      font-weight: bold;
    }

    .suggestion-category {
      font-size: 12px;
      color: #7a8a99;
      margin-top: 4px;
    }

    /* History box styles */
    #history-box {
      position: absolute;
      top: 100%;
      left: 0;
      width: 100%;
      background: white;
      border: 1px solid #c9d8e6;
      border-top: none;
      border-radius: 0 0 12px 12px;
      box-shadow: 0 8px 20px rgba(18, 60, 90, 0.1);
      z-index: 1000;
      display: none;
      max-height: 300px;
      overflow-y: auto;
      margin-top: 0;
    }

    #history-box.show {
      display: block;
      animation: slideDown 0.2s ease;
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .history-header {
      padding: 10px 16px;
      font-size: 12px;
      color: #7a8a99;
      font-weight: bold;
      border-bottom: 1px solid #eef2f7;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .history-clear-btn {
      font-size: 12px;
      color: #4f9ecf;
      cursor: pointer;
      background: none;
      border: none;
      padding: 0 4px;
      transition: color 0.2s ease;
    }

    .history-clear-btn:hover {
      color: #246b9a;
    }

    .history-item {
      padding: 12px 16px;
      cursor: pointer;
      font-size: 16px;
      color: #1f2d3d;
      border-bottom: 1px solid #eef2f7;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background-color 0.15s ease;
    }

    .history-item:last-child {
      border-bottom: none;
    }

    .history-item:hover {
      background-color: #eef7fc;
      color: #4f9ecf;
    }

    .history-item.highlighted {
      background-color: #e4f1f9;
      color: #4f9ecf;
      border-left: 3px solid #4f9ecf;
      padding-left: 13px;
    }

    .history-delete-btn {
      font-size: 12px;
      color: #9da8b3;
      cursor: pointer;
      background: none;
      border: none;
      padding: 4px 8px;
      transition: color 0.2s ease;
      opacity: 0;
    }

    .history-item:hover .history-delete-btn {
      opacity: 1;
    }

    .history-delete-btn:hover {
      color: #e53935;
    }

    .history-empty {
      padding: 12px 16px;
      text-align: center;
      color: #7a8a99;
      font-size: 14px;
    }

    @media (max-width: 600px) {
      .search-box,
      .compare-box,
      .action-row {
        flex-direction: column;
        align-items: stretch;
      }

      .search-input-wrapper {
        width: 100%;
      }

      input,
      button {
        width: 100%;
      }

      #suggestion-box {
        width: 100%;
      }

      .card,
      .empty,
      .panel {
        padding: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>志愿填报专业助手</h1>
    <p class="subtitle">
      不只是告诉你“这个专业学什么”，<br />
      更希望帮助你理解：这个专业可能会把你带向怎样的人生。
    </p>

    <div class="panel">
      <div class="panel-title">搜索专业</div>
      <div class="panel-desc">
        输入专业名称，了解这个专业学什么、未来做什么、适合什么样的人。
      </div>

      <div class="search-box">
        <div class="search-input-wrapper">
          <input
            type="text"
            id="majorInput"
            placeholder="例如：计算机 / 法学 / 会计 / 视觉传达设计"
            autocomplete="off"
          />
          <div id="suggestion-box"></div>
          <div id="history-box"></div>
        </div>
        <button onclick="searchMajor()">查询专业</button>
      </div>

      <div class="tips">
        可尝试搜索：计算机、法、金融、医学、设计、会计
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">按偏好推荐专业</div>
      <div class="panel-desc">
        如果你还不知道搜什么，可以先选几个你更看重的方向，系统会推荐更匹配的专业。
      </div>

      <div class="recommend-box">
        <button type="button" class="pref-btn" onclick="togglePreference(this, '逻辑分析')">逻辑分析</button>
        <button type="button" class="pref-btn" onclick="togglePreference(this, '稳定就业')">稳定就业</button>
        <button type="button" class="pref-btn" onclick="togglePreference(this, '高收入潜力')">高收入潜力</button>
        <button type="button" class="pref-btn" onclick="togglePreference(this, '创意表达')">创意表达</button>
        <button type="button" class="pref-btn" onclick="togglePreference(this, '与人沟通')">与人沟通</button>
        <button type="button" class="pref-btn" onclick="togglePreference(this, '继续深造')">继续深造</button>
        <button type="button" class="pref-btn" onclick="togglePreference(this, '技术导向')">技术导向</button>
      </div>

      <div class="action-row">
        <button onclick="recommendMajors()">为我推荐专业</button>
        <button class="secondary-btn" onclick="clearPreferences()">清空已选标签</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-title">专业对比</div>
      <div class="panel-desc">
        如果你正在两个专业之间犹豫，可以直接对比它们的生活方式、发展路径和适合人群。
      </div>

      <div class="compare-box">
        <input id="compare1" placeholder="输入专业A，例如：计算机" />
        <input id="compare2" placeholder="输入专业B，例如：法学" />
        <button onclick="compareMajors()">对比专业</button>
      </div>
    </div>

    <div id="result" class="empty">
      请输入一个专业开始查询，或使用推荐 / 对比功能。
    </div>
  </div>

  <script>
    let majorsData = [];
    let selectedPreferences = [];
    let suggestionBoxPosition = null;
    const HISTORY_KEY = 'majorSearchHistory';
    const MAX_HISTORY = 10;

    async function loadMajors() {
      try {
        const response = await fetch("./majors.json");
        majorsData = await response.json();
      } catch (error) {
        document.getElementById("result").innerHTML = `
          <div class="empty">
            数据加载失败，请确认 majors.json 是否和 index.html 放在同一文件夹中。
          </div>
        `;
      }
    }

    function renderTags(items = []) {
      return items.map(item => `<span class="tag">${item}</span>`).join("");
    }

    // Add search record to history
    function addToHistory(majorName) {
      let history = JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
      
      // Remove if already exists (to avoid duplicates)
      history = history.filter(item => item !== majorName);
      
      // Add to the beginning
      history.unshift(majorName);
      
      // Keep only the latest MAX_HISTORY items
      history = history.slice(0, MAX_HISTORY);
      
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
    }

    // Get search history
    function getHistory() {
      return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]');
    }

    // Clear all history
    function clearHistory() {
      localStorage.removeItem(HISTORY_KEY);
      hideHistoryBox();
    }

    // Remove single history item
    function removeHistoryItem(majorName) {
      let history = getHistory();
      history = history.filter(item => item !== majorName);
      localStorage.setItem(HISTORY_KEY, JSON.stringify(history));
      renderHistoryBox();
    }

    // Render history box
    function renderHistoryBox() {
      const historyBox = document.getElementById('history-box');
      const history = getHistory();

      if (history.length === 0) {
        historyBox.innerHTML = '<div class="history-empty">暂无搜索记录</div>';
        currentHistoryIndex = -1;
        currentHistoryItems = [];
        return;
      }

      // Store current history items for keyboard navigation
      currentHistoryItems = history;
      currentHistoryIndex = -1;

      let html = `
        <div class="history-header">
          <span>搜索历史</span>
          <button class="history-clear-btn" onclick="clearHistory()">清空</button>
        </div>
      `;

      html += history.map((major, index) => `
        <div class="history-item" data-index="${index}" onclick="selectHistory('${major.replace(/'/g, "\\'")}')" style="cursor: pointer;">
          <span>${major}</span>
          <button class="history-delete-btn" onclick="event.stopPropagation(); removeHistoryItem('${major.replace(/'/g, "\\'")}')" style="cursor: pointer;">×</button>
        </div>
      `).join('');

      historyBox.innerHTML = html;
    }

    // Show history box
    function showHistoryBox() {
      const historyBox = document.getElementById('history-box');
      const history = getHistory();
      
      if (history.length === 0) {
        historyBox.classList.remove('show');
        return;
      }

      renderHistoryBox();
      historyBox.classList.add('show');
    }

    // Hide history box
    function hideHistoryBox() {
      document.getElementById('history-box').classList.remove('show');
    }

    // Select from history
    function selectHistory(majorName) {
      document.getElementById('majorInput').value = majorName;
      hideHistoryBox();
      document.getElementById('suggestion-box').classList.remove('show');
      searchMajor();
    }

    function renderMajorCard(found, extraTag = "") {
      return `
        <div class="card">
          <h2>${found.name}</h2>
          <div>
            ${extraTag}
            <span class="tag">专业代码：${found.code}</span>
            <span class="tag">学科门类：${found.category}</span>
          </div>

          <div class="section-title">这个专业主要学什么</div>
          <div>${found.intro}</div>

          <div class="section-title">你未来可能在过怎样的学习 / 工作生活</div>
          <div>${found.day}</div>

          <div class="section-title">常见岗位</div>
          <div>${renderTags(found.jobs)}</div>

          <div class="section-title">常见行业</div>
          <div>${renderTags(found.industry)}</div>

          <div class="section-title">薪资参考</div>
          <div>${found.salary_detail}</div>

          <div class="section-title">未来发展方向</div>
          <div>${found.prospect}</div>

          <div class="section-title">适合什么样的人</div>
          <div>${found.suitable}</div>

          <div class="section-title">你需要提前知道的现实</div>
          <div>${found.risk}</div>

          <div class="section-title">读研方向</div>
          <div>${renderTags(found.postgraduate)}</div>

          <div class="section-title">专业特点</div>
          <div>${renderTags(found.tags)}</div>

          <div class="section-title">院校参考</div>
          <div>${renderTags(found.schools)}</div>

          <div class="footer-note">
            注：当前页面为产品原型版本，薪资与发展路径为概括性参考，实际情况会受城市、学历、院校、行业、个人能力与机会影响。
          </div>
        </div>
      `;
    }

    function searchMajor() {
      const input = document.getElementById("majorInput").value.trim();
      const result = document.getElementById("result");

      if (!input) {
        result.innerHTML = `<div class="empty">请先输入一个专业名称。</div>`;
        return;
      }

      const results = majorsData.filter(item => item.name.includes(input));

      if (results.length > 0) {
        result.innerHTML = results.map(found => renderMajorCard(found)).join("");
        addToHistory(input); // Add to history when search is successful
      } else {
        result.innerHTML = `
          <div class="empty">
            暂时没有找到"${input}"这个专业的数据。<br />
            你可以先试试：计算机、法、金融、会计、设计、医学。
          </div>
        `;
      }
      hideSuggestionBox();
      
      // Auto scroll to result
      setTimeout(() => {
        const elementPosition = result.getBoundingClientRect().top + window.scrollY - 100;
        window.scrollTo({
          top: elementPosition,
          behavior: 'smooth'
        });
      }, 100);
    }

    function togglePreference(button, tag) {
      if (selectedPreferences.includes(tag)) {
        selectedPreferences = selectedPreferences.filter(item => item !== tag);
        button.classList.remove("active");
      } else {
        selectedPreferences.push(tag);
        button.classList.add("active");
      }
    }

    function clearPreferences() {
      selectedPreferences = [];
      document.querySelectorAll(".pref-btn").forEach(btn => {
        btn.classList.remove("active");
      });
    }

    function recommendMajors() {
      const result = document.getElementById("result");

      if (selectedPreferences.length === 0) {
        result.innerHTML = `<div class="empty">请先选择至少一个偏好标签。</div>`;
        return;
      }

      const ranked = majorsData
        .map(major => {
          const matchCount = major.tags
            ? major.tags.filter(tag => selectedPreferences.includes(tag)).length
            : 0;
          return { ...major, matchCount };
        })
        .filter(major => major.matchCount > 0)
        .sort((a, b) => b.matchCount - a.matchCount)
        .slice(0, 3);

      if (ranked.length === 0) {
        result.innerHTML = `<div class="empty">暂时没有匹配这些偏好的专业。</div>`;
        return;
      }

      result.innerHTML = ranked
        .map(found =>
          renderMajorCard(
            found,
            `<span class="tag">匹配度：${found.matchCount} / ${selectedPreferences.length}</span>`
          )
        )
        .join("");
      
      // Auto scroll to result
      setTimeout(() => {
        const elementPosition = result.getBoundingClientRect().top + window.scrollY - 100;
        window.scrollTo({
          top: elementPosition,
          behavior: 'smooth'
        });
      }, 100);
    }

    function findMajorByInput(input) {
      return majorsData.find(item => item.name.includes(input));
    }

    // Fuzzy match helper: checks if input characters appear sequentially in text
    function fuzzyMatch(input, text) {
      let inputIdx = 0;
      let textIdx = 0;
      
      while (inputIdx < input.length && textIdx < text.length) {
        if (input[inputIdx].toLowerCase() === text[textIdx].toLowerCase()) {
          inputIdx++;
        }
        textIdx++;
      }
      
      return inputIdx === input.length;
    }

    // Highlight matched characters in the suggestion item
    function highlightMatch(text, input) {
      let result = '';
      let inputIdx = 0;
      
      for (let i = 0; i < text.length; i++) {
        if (inputIdx < input.length && text[i].toLowerCase() === input[inputIdx].toLowerCase()) {
          result += `<strong>${text[i]}</strong>`;
          inputIdx++;
        } else {
          result += text[i];
        }
      }
      
      return result;
    }

    // Render suggestions based on user input
    function renderSuggestions(input) {
      const suggestionBox = document.getElementById('suggestion-box');
      
      if (!input.trim()) {
        suggestionBox.classList.remove('show');
        suggestionBox.innerHTML = '';
        currentSuggestionIndex = -1;
        currentSuggestions = [];
        return;
      }

      // Filter majors: match name or category, using both substring and fuzzy matching
      const filtered = majorsData.filter(major => {
        const inputLower = input.toLowerCase();
        const nameLower = major.name.toLowerCase();
        const categoryLower = major.category.toLowerCase();
        
        // Prioritize substring matches (exact contains)
        if (nameLower.includes(inputLower) || categoryLower.includes(inputLower)) {
          return true;
        }
        
        // Fall back to fuzzy matching
        return fuzzyMatch(input, major.name) || fuzzyMatch(input, major.category);
      }).slice(0, 5); // Max 5 results

      if (filtered.length === 0) {
        suggestionBox.classList.remove('show');
        suggestionBox.innerHTML = '';
        currentSuggestionIndex = -1;
        currentSuggestions = [];
        return;
      }

      // Store current suggestions for keyboard navigation
      currentSuggestions = filtered;
      currentSuggestionIndex = -1;

      // Render suggestion items
      suggestionBox.innerHTML = filtered.map((major, index) => `
        <div class="suggestion-item" data-index="${index}" onclick="selectSuggestion('${major.name.replace(/'/g, "\\'")}')">
          ${highlightMatch(major.name, input)}
          <div class="suggestion-category">${major.category}</div>
        </div>
      `).join('');

      suggestionBox.classList.add('show');
    }

    // Highlight current suggestion
    function highlightCurrentSuggestion() {
      const items = document.querySelectorAll('.suggestion-item');
      items.forEach(item => item.classList.remove('highlighted'));
      
      if (currentSuggestionIndex >= 0 && currentSuggestionIndex < items.length) {
        items[currentSuggestionIndex].classList.add('highlighted');
      }
    }

    // Highlight current history item
    function highlightCurrentHistory() {
      const items = document.querySelectorAll('.history-item');
      items.forEach(item => item.classList.remove('highlighted'));
      
      if (currentHistoryIndex >= 0 && currentHistoryIndex < items.length) {
        items[currentHistoryIndex].classList.add('highlighted');
      }
    }

    // Handle suggestion item click
    function selectSuggestion(majorName) {
      document.getElementById('majorInput').value = majorName;
      document.getElementById('suggestion-box').classList.remove('show');
      searchMajor();
    }

    // Hide suggestion box when clicking outside
    function hideSuggestionBox(event) {
      const suggestionBox = document.getElementById('suggestion-box');
      const historyBox = document.getElementById('history-box');
      const majorInput = document.getElementById('majorInput');
      
      // If no event is provided, simply hide both boxes
      if (!event) {
        suggestionBox.classList.remove('show');
        historyBox.classList.remove('show');
        return;
      }
      
      // If event exists, only hide when clicking outside
      if (!majorInput.contains(event.target) && !suggestionBox.contains(event.target) && !historyBox.contains(event.target)) {
        suggestionBox.classList.remove('show');
        historyBox.classList.remove('show');
      }
    }

    function generateComparisonConclusion(major1, major2) {
      if (major1.tags.includes("高收入潜力") && !major2.tags.includes("高收入潜力")) {
        return `如果你更追求收入上限和更快的职业回报，${major1.name}通常会更吸引你；如果你更看重路径的秩序感、资格壁垒或长期稳定性，${major2.name}可能更适合。`;
      }

      if (major2.tags.includes("高收入潜力") && !major1.tags.includes("高收入潜力")) {
        return `如果你更追求收入上限和更快的职业回报，${major2.name}通常会更吸引你；如果你更看重路径的秩序感、资格壁垒或长期稳定性，${major1.name}可能更适合。`;
      }

      if (major1.tags.includes("创意表达") && !major2.tags.includes("创意表达")) {
        return `${major1.name}更偏向表达、审美和个人风格成长，${major2.name}则更偏向结构化路径。关键不在“哪个好”，而在于你更想过哪种生活。`;
      }

      if (major2.tags.includes("创意表达") && !major1.tags.includes("创意表达")) {
        return `${major2.name}更偏向表达、审美和个人风格成长，${major1.name}则更偏向结构化路径。关键不在“哪个好”，而在于你更想过哪种生活。`;
      }

      return `${major1.name}和${major2.name}都可能通向不错的发展，但它们对应的日常状态、压力来源和成长方式不同。真正值得比较的，是哪一种人生更让你愿意长期投入。`;
    }

    function compareMajors() {
      const input1 = document.getElementById("compare1").value.trim();
      const input2 = document.getElementById("compare2").value.trim();
      const result = document.getElementById("result");

      if (!input1 || !input2) {
        result.innerHTML = `<div class="empty">请先输入两个专业名称再进行对比。</div>`;
        return;
      }

      const major1 = findMajorByInput(input1);
      const major2 = findMajorByInput(input2);

      if (!major1 || !major2) {
        result.innerHTML = `<div class="empty">请输入两个有效专业名称，例如“计算机”和“法学”。</div>`;
        return;
      }

      const conclusion = generateComparisonConclusion(major1, major2);

      result.innerHTML = `
        <div class="card">
          <h2>专业对比：${major1.name} vs ${major2.name}</h2>

          <div class="decision-box">
            <strong>一句话建议：</strong>${conclusion}
          </div>

          <div class="section-title">对比总览</div>
          <div class="compare-grid">
            <div class="compare-cell compare-label">维度</div>
            <div class="compare-cell"><strong>${major1.name}</strong></div>
            <div class="compare-cell"><strong>${major2.name}</strong></div>

            <div class="compare-cell compare-label">这个专业主要学什么</div>
            <div class="compare-cell">${major1.intro}</div>
            <div class="compare-cell">${major2.intro}</div>

            <div class="compare-cell compare-label">你未来可能在过怎样的学习 / 工作生活</div>
            <div class="compare-cell">${major1.day}</div>
            <div class="compare-cell">${major2.day}</div>

            <div class="compare-cell compare-label">常见岗位</div>
            <div class="compare-cell">${major1.jobs.join("、")}</div>
            <div class="compare-cell">${major2.jobs.join("、")}</div>

            <div class="compare-cell compare-label">常见行业</div>
            <div class="compare-cell">${major1.industry.join("、")}</div>
            <div class="compare-cell">${major2.industry.join("、")}</div>

            <div class="compare-cell compare-label">薪资参考</div>
            <div class="compare-cell">${major1.salary_detail}</div>
            <div class="compare-cell">${major2.salary_detail}</div>

            <div class="compare-cell compare-label">未来发展方向</div>
            <div class="compare-cell">${major1.prospect}</div>
            <div class="compare-cell">${major2.prospect}</div>

            <div class="compare-cell compare-label">适合什么样的人</div>
            <div class="compare-cell">${major1.suitable}</div>
            <div class="compare-cell">${major2.suitable}</div>

            <div class="compare-cell compare-label">你需要提前知道的现实</div>
            <div class="compare-cell">${major1.risk}</div>
            <div class="compare-cell">${major2.risk}</div>

            <div class="compare-cell compare-label">专业特点</div>
            <div class="compare-cell">${renderTags(major1.tags)}</div>
            <div class="compare-cell">${renderTags(major2.tags)}</div>
          </div>

          <div class="section-title">怎么选更适合你</div>
          <div>
            如果你读到 <strong>${major1.name}</strong> 的描述时，会觉得“虽然辛苦，但我愿意过这样的日子”，那它就有可能更适合你。<br /><br />
            如果你读到 <strong>${major2.name}</strong> 的描述时，会觉得“这条路虽然不轻松，但我能接受它的训练方式和成长节奏”，那它也许就是更合适的方向。<br /><br />
            真正重要的不是哪个更“体面”，而是哪一个更让你愿意长期投入。
          </div>
        </div>
      `;
      
      // Auto scroll to result
      setTimeout(() => {
        const elementPosition = result.getBoundingClientRect().top + window.scrollY - 100;
        window.scrollTo({
          top: elementPosition,
          behavior: 'smooth'
        });
      }, 100);
    }

    loadMajors();

    // Track current highlighted suggestion
    let currentSuggestionIndex = -1;
    let currentSuggestions = [];
    // Track current highlighted history
    let currentHistoryIndex = -1;
    let currentHistoryItems = [];

    // Suggestion box input listener
    document.getElementById("majorInput").addEventListener("input", function(event) {
      if (event.target.value.trim()) {
        renderSuggestions(event.target.value);
        hideHistoryBox();
      } else {
        document.getElementById('suggestion-box').classList.remove('show');
        showHistoryBox();
      }
    });

    // Show history when input is focused and empty
    document.getElementById("majorInput").addEventListener("focus", function(event) {
      if (!event.target.value.trim()) {
        showHistoryBox();
      }
    });



    // Global click listener for dismissing suggestions
    document.addEventListener("click", hideSuggestionBox);

    document.getElementById("majorInput").addEventListener("keydown", function(event) {
      const suggestionBox = document.getElementById('suggestion-box');
      const historyBox = document.getElementById('history-box');
      const isShowingSuggestions = suggestionBox.classList.contains('show');
      const isShowingHistory = historyBox.classList.contains('show');
      
      if (event.key === "ArrowDown") {
        event.preventDefault();
        if (isShowingSuggestions && currentSuggestions.length > 0) {
          currentSuggestionIndex = Math.min(currentSuggestionIndex + 1, currentSuggestions.length - 1);
          highlightCurrentSuggestion();
        } else if (isShowingHistory && currentHistoryItems.length > 0) {
          currentHistoryIndex = Math.min(currentHistoryIndex + 1, currentHistoryItems.length - 1);
          highlightCurrentHistory();
        }
      } else if (event.key === "ArrowUp") {
        event.preventDefault();
        if (isShowingSuggestions && currentSuggestions.length > 0) {
          currentSuggestionIndex = Math.max(currentSuggestionIndex - 1, -1);
          highlightCurrentSuggestion();
        } else if (isShowingHistory && currentHistoryItems.length > 0) {
          currentHistoryIndex = Math.max(currentHistoryIndex - 1, -1);
          highlightCurrentHistory();
        }
      } else if (event.key === "Enter") {
        if (isShowingSuggestions && currentSuggestionIndex >= 0 && currentSuggestions.length > 0) {
          // Select highlighted suggestion
          event.preventDefault();
          selectSuggestion(currentSuggestions[currentSuggestionIndex].name);
        } else if (isShowingHistory && currentHistoryIndex >= 0 && currentHistoryItems.length > 0) {
          // Select highlighted history item
          event.preventDefault();
          selectHistory(currentHistoryItems[currentHistoryIndex]);
        } else {
          // Search with current input
          searchMajor();
        }
      }
    });

    document.getElementById("compare1").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        compareMajors();
      }
    });

    document.getElementById("compare2").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        compareMajors();
      }
    });
  </script>
</body>
</html>
